services:
  omada:
    image: mbentley/omada-controller:latest
    container_name: omada-controller
    restart: unless-stopped
    environment:
      - TZ=${OMADA_TZ:-Asia/Kolkata}
    ports:
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_HTTP_PORT:-8088}:8088/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_HTTPS_PORT:-8043}:8043/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_PORTAL_HTTP:-8880}:8880/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_PORTAL_HTTPS:-8843}:8843/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_DISCOVERY_UDP:-29810}:29810/udp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_MANAGER_TCP:-29811}:29811/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_ADOPTION_TCP:-29812}:29812/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_UPGRADE_TCP:-29813}:29813/tcp"
      - "${OMADA_BIND_IP:-0.0.0.0}:${OMADA_MANAGER_UDP:-29814}:29814/udp"
    volumes:
      - omada_data:/opt/tplink/EAPController/data
      - omada_logs:/opt/tplink/EAPController/logs

volumes:
  omada_data:
  omada_logs:
