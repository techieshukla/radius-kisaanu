name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  php-and-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: PHP Lint
        run: |
          find portal -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Unit Tests
        run: php portal/tests/run.php

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Shell Scripts
        run: |
          find scripts -type f -name "*.sh" -print0 | xargs -0 shellcheck

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Env
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config
