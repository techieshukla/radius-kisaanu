server {
  listen 80;
  server_name _;
  root /var/www/html/public;
  index index.php index.html;

  # Block access to hidden files (.env, .git, etc.) while allowing ACME path.
  location ~ /\.(?!well-known).* {
    deny all;
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Pretty URLs mapped to concrete PHP pages.
  location = /login {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/login.php;
    fastcgi_param SCRIPT_NAME /login.php;
    fastcgi_pass php:9000;
  }
  location = /register {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/register.php;
    fastcgi_param SCRIPT_NAME /register.php;
    fastcgi_pass php:9000;
  }
  location = /dashboard {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/dashboard.php;
    fastcgi_param SCRIPT_NAME /dashboard.php;
    fastcgi_pass php:9000;
  }
  location = /profile {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/profile.php;
    fastcgi_param SCRIPT_NAME /profile.php;
    fastcgi_pass php:9000;
  }

  location ~ \.php$ {
    try_files $uri =404;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
  }
}
