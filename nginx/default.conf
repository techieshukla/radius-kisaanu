server {
  listen 80;
  server_name _;
  root /var/www/html/public;
  index index.php index.html;

  # Block access to hidden files (.env, .git, etc.) while allowing ACME path.
  location ~ /\.(?!well-known).* {
    deny all;
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  # App-style routes backed by wifi.php without external redirects.
  location = /login {
    rewrite ^ /wifi.php?view=login last;
  }
  location = /register {
    rewrite ^ /wifi.php?view=register last;
  }
  location = /dashboard {
    rewrite ^ /wifi.php?view=dashboard last;
  }
  location = /profile {
    rewrite ^ /wifi.php?view=profile last;
  }

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
  }
}
