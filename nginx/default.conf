server {
  listen 80;
  server_name _;
  root /var/www/html/public;
  index index.php index.html;

  # Block access to hidden files (.env, .git, etc.) while allowing ACME path.
  location ~ /\.(?!well-known).* {
    deny all;
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  # Pretty URLs mapped to concrete PHP pages.
  location = /login {
    rewrite ^ /login.php last;
  }
  location = /register {
    rewrite ^ /register.php last;
  }
  location = /dashboard {
    rewrite ^ /dashboard.php last;
  }
  location = /profile {
    rewrite ^ /profile.php last;
  }

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
  }
}
